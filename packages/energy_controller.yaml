# Home Assistant Package – Sigenergy + Amber Energy Controller
# ==============================================================
# Place this file in your HA config/packages/ directory.
# Add to configuration.yaml if not already present:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# This package defines:
#   - input_number helpers (configuration parameters)
#   - input_select helpers (source selection)
#   - input_boolean (manual override)
#   - Template sensors (derived values for dashboard display)
#   - Automations (daily solar forecast recalculation notification)

# ── Configuration helpers ─────────────────────────────────────────────────

input_number:

  energy_expected_daily_house_load:
    name: "Expected Daily House Load"
    min: 1
    max: 100
    step: 0.5
    initial: 20
    unit_of_measurement: kWh
    icon: mdi:home-lightning-bolt

  energy_max_export_power:
    name: "Maximum Export Power"
    min: 0
    max: 28
    step: 0.5
    initial: 10
    unit_of_measurement: kW
    icon: mdi:transmission-tower-export

  energy_max_charge_power:
    name: "Maximum Charge Power"
    min: 0
    max: 12
    step: 0.5
    initial: 10
    unit_of_measurement: kW
    icon: mdi:battery-charging

  energy_max_discharge_power:
    name: "Maximum Discharge Power"
    min: 0
    max: 12
    step: 0.5
    initial: 10
    unit_of_measurement: kW
    icon: mdi:battery-minus

  energy_battery_min_soc:
    name: "Battery Minimum SOC (Charge Target)"
    min: 5
    max: 100
    step: 1
    initial: 20
    unit_of_measurement: "%"
    icon: mdi:battery-low

  energy_battery_full_threshold:
    name: "Battery Full Threshold"
    min: 50
    max: 100
    step: 1
    initial: 95
    unit_of_measurement: "%"
    icon: mdi:battery

  energy_cheap_import_threshold:
    name: "Cheap Import Price Threshold"
    min: -50
    max: 50
    step: 0.5
    initial: 10
    unit_of_measurement: "c/kWh"
    icon: mdi:tag-arrow-down

input_select:

  energy_amber_live_source:
    name: "Live Price Source"
    options:
      - "Amber Electric"
      - "Amber Express"
    initial: "Amber Electric"
    icon: mdi:lightning-bolt-circle

  energy_amber_forecast_source:
    name: "Forecast Price Source"
    options:
      - "Amber Electric"
      - "Amber Express"
    initial: "Amber Electric"
    icon: mdi:chart-timeline-variant

input_boolean:

  energy_manual_override:
    name: "Energy Controller Manual Override"
    initial: false
    icon: mdi:hand-back-right

# ── Template sensors ──────────────────────────────────────────────────────

template:
  - sensor:

      # Current import price in c/kWh (human-friendly unit)
      - name: "Energy Import Price Cents"
        unique_id: energy_import_price_cents
        unit_of_measurement: "c/kWh"
        state_class: measurement
        state: >
          {% set src = states('input_select.energy_amber_live_source') %}
          {% if src == 'Amber Express' %}
            {% set raw = states('sensor.the_hump_express_general_price') | float(0) %}
          {% else %}
            {% set raw = states('sensor.the_hump_general_price') | float(0) %}
          {% endif %}
          {{ (raw * 100) | round(2) }}
        attributes:
          source: "{{ states('input_select.energy_amber_live_source') }}"

      # Current export (feed-in) price in c/kWh
      - name: "Energy Export Price Cents"
        unique_id: energy_export_price_cents
        unit_of_measurement: "c/kWh"
        state_class: measurement
        state: >
          {% set src = states('input_select.energy_amber_live_source') %}
          {% if src == 'Amber Express' %}
            {% set raw = states('sensor.the_hump_express_feed_in_price') | float(0) %}
          {% else %}
            {% set raw = states('sensor.the_hump_feed_in_price') | float(0) %}
          {% endif %}
          {{ (raw * 100) | round(2) }}
        attributes:
          source: "{{ states('input_select.energy_amber_live_source') }}"

      # Net grid power: positive = importing, negative = exporting
      - name: "Grid Net Power"
        unique_id: grid_net_power
        unit_of_measurement: kW
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.sigen_plant_grid_active_power') | float(0) | round(2) }}

      # Solar surplus/deficit vs expected load today
      - name: "Solar vs Load Today"
        unique_id: solar_vs_load_today
        unit_of_measurement: kWh
        state_class: measurement
        state: >
          {% set forecast = states('sensor.solcast_pv_forecast_forecast_today') | float(0) %}
          {% set load = states('input_number.energy_expected_daily_house_load') | float(20) %}
          {{ (forecast - load) | round(2) }}
        attributes:
          solar_forecast: "{{ states('sensor.solcast_pv_forecast_forecast_today') | float(0) }}"
          expected_load:  "{{ states('input_number.energy_expected_daily_house_load') | float(20) }}"
          is_deficit: >
            {{ (states('sensor.solcast_pv_forecast_forecast_today') | float(0)) <
               (states('input_number.energy_expected_daily_house_load') | float(20)) }}

      # Battery SOC status label
      - name: "Battery SOC Status"
        unique_id: battery_soc_status
        state: >
          {% set soc = states('sensor.sigen_plant_battery_state_of_charge') | float(0) %}
          {% set min_soc = states('input_number.energy_battery_min_soc') | float(20) %}
          {% set full = states('input_number.energy_battery_full_threshold') | float(95) %}
          {% if soc >= full %}
            Full
          {% elif soc >= 50 %}
            Good
          {% elif soc >= min_soc %}
            OK
          {% else %}
            Low
          {% endif %}
        attributes:
          soc_pct: "{{ states('sensor.sigen_plant_battery_state_of_charge') | float(0) }}"

      # Current power flow summary (for a single glance card)
      - name: "Power Flow Summary"
        unique_id: power_flow_summary
        state: >
          {% set solar = states('sensor.sigen_plant_sigen_pv_power') | float(0) %}
          {% set load  = states('sensor.sigen_plant_total_load_power') | float(0) %}
          {% set batt  = states('sensor.sigen_plant_battery_power') | float(0) %}
          {% set grid  = states('sensor.sigen_plant_grid_active_power') | float(0) %}
          {% set grid_dir = 'Import' if grid > 0 else 'Export' %}
          ☀️ {{ solar | round(1) }} kW → 🏠 {{ load | round(1) }} kW | 🔋 {{ batt | round(1) }} kW | ⚡ {{ grid_dir }} {{ (grid | abs) | round(1) }} kW
        attributes:
          solar_kw: "{{ states('sensor.sigen_plant_sigen_pv_power') | float(0) | round(2) }}"
          load_kw:  "{{ states('sensor.sigen_plant_total_load_power') | float(0) | round(2) }}"
          battery_kw: "{{ states('sensor.sigen_plant_battery_power') | float(0) | round(2) }}"
          grid_kw: "{{ states('sensor.sigen_plant_grid_active_power') | float(0) | round(2) }}"
          battery_soc: "{{ states('sensor.sigen_plant_battery_state_of_charge') | float(0) }}"

# ── Automations ──────────────────────────────────────────────────────────

automation:

  # Notify when price goes very negative (opportunity to charge)
  - id: energy_negative_price_alert
    alias: "Energy: Negative Import Price Alert"
    description: "Notify when import price drops below -5c (very negative – free charging)"
    trigger:
      - platform: numeric_state
        entity_id: sensor.energy_import_price_cents
        below: -5
    condition: []
    action:
      - service: persistent_notification.create
        data:
          title: "⚡ Negative Electricity Price!"
          message: >
            Import price is {{ states('sensor.energy_import_price_cents') }} c/kWh –
            the Energy Controller is charging your battery from the grid for free.
          notification_id: negative_price_alert
    mode: single

  # Notify when controller mode changes
  - id: energy_mode_change_notify
    alias: "Energy: Mode Change Notification"
    description: "Log mode changes to persistent notifications"
    trigger:
      - platform: state
        entity_id: sensor.energy_controller_mode
    condition: []
    action:
      - service: persistent_notification.create
        data:
          title: "Energy Controller"
          message: >
            Mode changed to **{{ states('sensor.energy_controller_mode') }}**

            {{ states('sensor.energy_controller_reason') }}
          notification_id: energy_mode_change
    mode: single
