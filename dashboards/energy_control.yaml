  # ══════════════════════════════════════════════════════════════
  - title: Configuration
    path: configuration
    icon: mdi:cog
    cards:

      # ── Override Buttons (same as Overview tab) ─────────────
      - !include energy_override_buttons.yaml

      # ── Dashboard Display ────────────────────────────────────
      - type: entities
        title: Dashboard Display
        entities:
          - entity: input_boolean.energy_power_flow_visual
            name: Graphical Power Flow (animated house view)
            icon: mdi:home-lightning-bolt-outline
          - entity: input_number.energy_power_flow_text_size
            name: Power Flow Card Text Size (1–10)
            icon: mdi:format-size

      # ── Hands-off Override ───────────────────────────────────
      - type: entities
        title: Hands-off Override (controller stops sending commands)
        entities:
          - entity: input_boolean.energy_manual_override
            name: Enable Hands-off Override
            icon: mdi:hand-back-right

      - type: markdown
        content: >
          ⚠️ When **Hands-off Override** is on, the controller will not send any commands to Sigenergy.

      # ── HA Control Switch ────────────────────────────────────
      - type: entities
        title: Sigenergy Remote Control
        entities:
          - entity: switch.sigen_plant_remote_ems_controlled_by_home_assistant
            name: Remote EMS Controlled by Home Assistant

      - type: markdown
        content: >
          ⚠️ Turn **Remote EMS** on when you are ready for the controller to send commands to the inverter.

      # ── Price Source Selection ───────────────────────────────
      - type: entities
        title: Price Data Sources
        entities:
          - entity: input_select.energy_amber_live_source
            name: Live Price Source
          - entity: input_select.energy_amber_forecast_source
            name: Forecast Price Source

      # ── Load & Power Parameters ──────────────────────────────
      - type: entities
        title: Load & Power Configuration
        entities:
          - entity: input_number.energy_expected_daily_house_load
            name: Expected Daily House Load
          - entity: input_number.energy_max_export_power
            name: Max Export Power
          - entity: input_number.energy_max_charge_power
            name: Max Charge Power
          - entity: input_number.energy_max_discharge_power
            name: Max Discharge Power

      # ── Battery Parameters ───────────────────────────────────
      - type: entities
        title: Battery Configuration
        entities:
          - entity: sensor.sigen_plant_rated_energy_capacity
            name: Battery Capacity (from inverter)
          - entity: input_number.energy_battery_min_soc
            name: Minimum SOC (cheap charge target)
          - entity: input_number.energy_export_min_soc
            name: Export Min SOC (overnight reserve)
          - entity: input_number.energy_overnight_standing_load
            name: Overnight Standing Load (kW)
          - entity: input_number.energy_battery_full_threshold
            name: "Full Threshold (triggers Max Export)"

      # ── Price Thresholds ─────────────────────────────────────
      - type: entities
        title: Price Thresholds
        entities:
          - entity: input_number.energy_cheap_import_threshold
            name: Cheap Import Threshold
          - entity: input_number.energy_min_export_price
            name: Minimum Export Price
          - entity: input_boolean.energy_solar_export_spike_enabled
            name: Solar Export on Spike (enable)
          - entity: input_number.energy_solar_export_spike_threshold
            name: Solar Export Spike Threshold

      - type: markdown
        content: >
          **Battery Capacity**: Read directly from the inverter (sensor.sigen_plant_rated_energy_capacity).
          Used to convert kWh energy requirements into SOC%.

          **Minimum SOC (cheap charge target)**: On low-solar days, the controller will
          seek cheap import windows to charge the battery back to this level.

          **Export Min SOC**: The maximum overnight reserve — used when solar forecast is
          poor or outside the relaxation window. During the evening/morning window the
          controller calculates a lower floor from overnight load + Solcast, down to battery min SOC.

          **Overnight Standing Load**: Average house consumption overnight (kW). Used to
          calculate how much battery to keep for the hours between now and solar generation.
          Will be replaced by auto-calculation from historical data in a future update.

          **Cheap Import**: If import price ≤ this value **and** solar won't cover load,
          the controller will charge the battery to the Minimum SOC level.
          Prices below **0c** always trigger Force Charge regardless of this setting.

          **Minimum Export Price**: Export (Self Consume / Max Export) is only enabled
          when the feed-in price is at or above this value. Default **0c** preserves
          the existing behaviour.

      # ── Controller Status ────────────────────────────────────
      - type: entities
        title: Controller Status
        entities:
          - entity: sensor.energy_controller_mode
            name: Current Mode
          - entity: sensor.energy_controller_reason
            name: Reason
          - entity: sensor.energy_today_plan
            name: Solar Day Summary

      # ── Sigenergy Control Entity Status ─────────────────────
      - type: entities
        title: Sigenergy Control Entities (current values)
        entities:
          - entity: select.sigen_plant_remote_ems_control_mode
            name: Operating Mode
          - entity: number.sigen_plant_grid_export_limitation
            name: Grid Export Limit
          - entity: number.sigen_plant_pcs_export_limitation
            name: PCS Export Limit
          - entity: number.sigen_plant_ess_max_charging_limit
            name: Max Charging Limit
          - entity: number.sigen_plant_ess_max_discharging_limit
            name: Max Discharging Limit
