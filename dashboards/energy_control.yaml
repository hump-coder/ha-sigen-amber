# Lovelace Dashboard – Sigenergy + Amber Energy Controller
# Uses only built-in HA card types (no custom cards required)

title: Energy Control
views:
  # ══════════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:solar-power
    badges: []
    cards:

      # ── Current Mode Banner ──────────────────────────────────
      - type: markdown
        content: >
          {% set mode = states('sensor.energy_controller_mode') %}
          {% set icons = {
            'Force Charge':    '⚡',
            'Cheap Charge':    '🔋',
            'Hold Battery':    '⏳',
            'Maximum Export':  '📤',
            'Self Consume':    '☀️',
            'No Export':       '🏠',
            'Manual Override': '🔧',
            'Error':           '❌'
          } %}
          {% set icon = icons.get(mode, '❓') %}
          ## {{ icon }} {{ mode }}
          {{ states('sensor.energy_controller_reason') }}

      # ── Override Buttons (reusable – include in any dashboard) ──
      - !include energy_override_buttons.yaml

      # ── Live Prices Row ──────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.energy_import_price_cents
            name: Import Price
            icon: mdi:transmission-tower
          - type: entity
            entity: sensor.energy_export_price_cents
            name: Export Price
            icon: mdi:transmission-tower-export

      # ── Battery SOC Gauge ────────────────────────────────────
      - type: gauge
        entity: sensor.sigen_plant_battery_state_of_charge
        name: Battery State of Charge
        unit: "%"
        min: 0
        max: 100
        needle: true
        severity:
          green: 50
          yellow: 20
          red: 0

      # ── Live Power Flow ───────────────────────────────────────
      - type: entities
        title: Live Power Flow
        entities:
          - entity: sensor.sigen_plant_pv_power
            name: Solar Generation
            icon: mdi:solar-power
          - entity: sensor.sigen_plant_total_load_power
            name: House Load
            icon: mdi:home-lightning-bolt
          - entity: sensor.sigen_plant_battery_power
            name: Battery Power (+ charge / − discharge)
            icon: mdi:battery-charging
          - entity: sensor.sigen_plant_grid_active_power
            name: Grid Power (+ import / − export)
            icon: mdi:transmission-tower
          - entity: sensor.sigen_plant_battery_state_of_charge
            name: Battery SOC
            icon: mdi:battery

      # ── Solar vs Load Today ──────────────────────────────────
      - type: markdown
        content: >
          {% set forecast = state_attr('sensor.energy_today_plan', 'solar_forecast_kwh') | float(0) %}
          {% set load = state_attr('sensor.energy_today_plan', 'expected_load_kwh') | float(0) %}
          {% set surplus = state_attr('sensor.energy_today_plan', 'surplus_kwh') | float(0) %}
          ## ☀️ Today's Solar vs Load

          Solar Forecast: **{{ forecast | round(1) }} kWh**
          Expected Load: **{{ load | round(1) }} kWh**
          {{ '✅ Surplus' if surplus >= 0 else '⚠️ Deficit' }}: **{{ surplus | abs | round(1) }} kWh**

          {% if surplus >= 0 %}
          Solar expected to cover load today
          {% else %}
          Solar may not cover load – controller will seek cheap import windows
          {% endif %}

      # ── Morning Export Floor ────────────────────────────────
      - type: markdown
        content: >
          {% set ws   = state_attr('sensor.energy_morning_soc_floor', 'window_start') | default('07:30') %}
          {% set we   = state_attr('sensor.energy_morning_soc_floor', 'window_end')   | default('11:00') %}
          {% set sol  = state_attr('sensor.energy_morning_soc_floor', 'morning_solar_kwh') | float(0) %}
          {% set esol = state_attr('sensor.energy_morning_soc_floor', 'morning_solar_effective_kwh') | float(0) %}
          {% set load = state_attr('sensor.energy_morning_soc_floor', 'morning_load_kwh') | float(0) %}
          {% set surp = state_attr('sensor.energy_morning_soc_floor', 'surplus_kwh') | float(0) %}
          {% set eff  = state_attr('sensor.energy_morning_soc_floor', 'effective_min_soc') | float(0) %}
          {% set base = state_attr('sensor.energy_morning_soc_floor', 'base_min_soc') | float(0) %}
          {% set relax = state_attr('sensor.energy_morning_soc_floor', 'relax_factor') | float(0) %}
          {% set soc  = states('sensor.sigen_plant_battery_state_of_charge') | float(0) %}
          {% set can  = state_attr('sensor.energy_morning_soc_floor', 'can_export') %}
          ## 🌅 Morning Window Export ({{ ws }}–{{ we }})
          **Solcast forecast:** {{ sol | round(1) }} kWh → {{ esol | round(1) }} kWh after 15% margin
          **Morning load est.:** {{ load | round(1) }} kWh
          {% if surp > 0 %}
          ☀️ **Surplus {{ surp | round(1) }} kWh** – solar will cover morning load and recharge battery
          {% else %}
          ⚠️ **Deficit {{ (surp | abs) | round(1) }} kWh** – morning solar won't cover load, protecting battery
          {% endif %}

          ---
          {% set now_h = now().hour + now().minute / 60 %}
          {% set morning_end = 11.0 %}
          {% set relax_start = 22.0 %}
          {% set in_window = now_h >= relax_start or now_h < morning_end %}
          **Export SOC floor:** {% if eff < base %}**{{ eff | round(0) | int }}%** *(relaxed from {{ base | round(0) | int }}%, {{ (relax * 100) | round(0) | int }}% of max relaxation applied)*{% elif not in_window %}**{{ base | round(0) | int }}%** *(outside relaxation window – normal rules)*{% elif now_h >= morning_end %}**{{ base | round(0) | int }}%** *(post-morning – solar cranking)*{% else %}**{{ base | round(0) | int }}%** *(no relaxation – morning solar won't cover load)*{% endif %}
          **Battery now:** {{ soc | round(0) | int }}% → {% if can %}✅ above floor, **battery export allowed**{% else %}🔒 below floor, **holding battery reserve**{% endif %}

      # ── Daily Cost / Revenue ─────────────────────────────────
      - type: markdown
        content: |
          {% set imp     = states('sensor.energy_daily_import_cost') | float(0) %}
          {% set exp     = states('sensor.energy_daily_export_revenue') | float(0) %}
          {% set net     = states('sensor.energy_daily_net_cost') | float(0) %}
          {% set imp_kwh = state_attr('sensor.energy_daily_import_cost', 'import_kwh') | float(0) %}
          {% set exp_kwh = state_attr('sensor.energy_daily_export_revenue', 'export_kwh') | float(0) %}
          {% set y_imp     = states('input_number.energy_yesterday_import_cost') | float(0) %}
          {% set y_exp     = states('input_number.energy_yesterday_export_revenue') | float(0) %}
          {% set y_net     = y_imp - y_exp %}
          {% set y_imp_kwh = states('input_number.energy_yesterday_import_kwh') | float(0) %}
          {% set y_exp_kwh = states('input_number.energy_yesterday_export_kwh') | float(0) %}
          ## 💰 Today's Cost & Revenue
          ⚡ Imported: **{{ imp_kwh | round(2) }} kWh** — cost **${{ imp | round(2) }}**
          📤 Exported: **{{ exp_kwh | round(2) }} kWh** — earned **${{ exp | round(2) }}**
          {% if net <= 0 %}✅ **Net profit: ${{ (net | abs) | round(2) }}**{% else %}💸 **Net cost: ${{ net | round(2) }}**{% endif %}

          ---
          ## 📅 Yesterday
          ⚡ Imported: **{{ y_imp_kwh | round(2) }} kWh** — cost **${{ y_imp | round(2) }}**
          📤 Exported: **{{ y_exp_kwh | round(2) }} kWh** — earned **${{ y_exp | round(2) }}**
          {% if y_net <= 0 %}✅ **Net profit: ${{ (y_net | abs) | round(2) }}**{% else %}💸 **Net cost: ${{ y_net | round(2) }}**{% endif %}

      # ── Today's Action Plan ──────────────────────────────────
      - type: markdown
        title: Today's Price & Action Plan
        content: >
          {{ state_attr('sensor.energy_today_plan', 'plan_markdown') or 'No forecast data available yet' }}

      # ── Price History Graph ──────────────────────────────────
      - type: history-graph
        title: Import / Export Price ($/kWh)
        hours_to_show: 24
        entities:
          - entity: sensor.the_hump_general_price
            name: Import
          - entity: sensor.the_hump_feed_in_price
            name: Export (Feed-in)

      # ── Power History Graph ──────────────────────────────────
      - type: history-graph
        title: Power Flow History
        hours_to_show: 12
        entities:
          - entity: sensor.sigen_plant_pv_power
            name: Solar
          - entity: sensor.sigen_plant_total_load_power
            name: Load
          - entity: sensor.sigen_plant_battery_power
            name: Battery
          - entity: sensor.sigen_plant_grid_active_power
            name: Grid

      # ── Mode Change History ──────────────────────────────────
      - type: history-graph
        title: Controller Mode History
        hours_to_show: 24
        entities:
          - entity: sensor.energy_controller_mode
            name: Mode

  # ══════════════════════════════════════════════════════════════
  - title: Configuration
    path: configuration
    icon: mdi:cog
    cards:

      # ── Override Buttons (same as Overview tab) ─────────────
      - !include energy_override_buttons.yaml

      # ── Hands-off Override ───────────────────────────────────
      - type: entities
        title: Hands-off Override (controller stops sending commands)
        entities:
          - entity: input_boolean.energy_manual_override
            name: Enable Hands-off Override
            icon: mdi:hand-back-right

      - type: markdown
        content: >
          ⚠️ When **Hands-off Override** is on, the controller will not send any commands to Sigenergy.

      # ── HA Control Switch ────────────────────────────────────
      - type: entities
        title: Sigenergy Remote Control
        entities:
          - entity: switch.sigen_plant_remote_ems_controlled_by_home_assistant
            name: Remote EMS Controlled by Home Assistant

      - type: markdown
        content: >
          ⚠️ Turn **Remote EMS** on when you are ready for the controller to send commands to the inverter.

      # ── Price Source Selection ───────────────────────────────
      - type: entities
        title: Price Data Sources
        entities:
          - entity: input_select.energy_amber_live_source
            name: Live Price Source
          - entity: input_select.energy_amber_forecast_source
            name: Forecast Price Source

      # ── Load & Power Parameters ──────────────────────────────
      - type: entities
        title: Load & Power Configuration
        entities:
          - entity: input_number.energy_expected_daily_house_load
            name: Expected Daily House Load
          - entity: input_number.energy_max_export_power
            name: Max Export Power
          - entity: input_number.energy_max_charge_power
            name: Max Charge Power
          - entity: input_number.energy_max_discharge_power
            name: Max Discharge Power

      # ── Battery Parameters ───────────────────────────────────
      - type: entities
        title: Battery Configuration
        entities:
          - entity: sensor.sigen_plant_rated_energy_capacity
            name: Battery Capacity (from inverter)
          - entity: input_number.energy_battery_min_soc
            name: Minimum SOC (cheap charge target)
          - entity: input_number.energy_export_min_soc
            name: Export Min SOC (overnight reserve)
          - entity: input_number.energy_overnight_standing_load
            name: Overnight Standing Load (kW)
          - entity: input_number.energy_battery_full_threshold
            name: "Full Threshold (triggers Max Export)"

      # ── Price Thresholds ─────────────────────────────────────
      - type: entities
        title: Price Thresholds
        entities:
          - entity: input_number.energy_cheap_import_threshold
            name: Cheap Import Threshold
          - entity: input_number.energy_min_export_price
            name: Minimum Export Price

      - type: markdown
        content: >
          **Battery Capacity**: Read directly from the inverter (sensor.sigen_plant_rated_energy_capacity).
          Used to convert kWh energy requirements into SOC%.

**Minimum SOC (cheap charge target)**: On low-solar days, the controller will
          seek cheap import windows to charge the battery back to this level.

          **Export Min SOC**: The maximum overnight reserve — used when solar forecast is
          poor or outside the relaxation window. During the evening/morning window the
          controller calculates a lower floor from overnight load + Solcast, down to battery min SOC.

          **Overnight Standing Load**: Average house consumption overnight (kW). Used to
          calculate how much battery to keep for the hours between now and solar generation.
          Will be replaced by auto-calculation from historical data in a future update.

          **Cheap Import**: If import price ≤ this value **and** solar won't cover load,
          the controller will charge the battery to the Minimum SOC level.
          Prices below **0c** always trigger Force Charge regardless of this setting.

          **Minimum Export Price**: Export (Self Consume / Max Export) is only enabled
          when the feed-in price is at or above this value. Default **0c** preserves
          the existing behaviour.

      # ── Controller Status ────────────────────────────────────
      - type: entities
        title: Controller Status
        entities:
          - entity: sensor.energy_controller_mode
            name: Current Mode
          - entity: sensor.energy_controller_reason
            name: Reason
          - entity: sensor.energy_today_plan
            name: Solar Day Summary

      # ── Sigenergy Control Entity Status ─────────────────────
      - type: entities
        title: Sigenergy Control Entities (current values)
        entities:
          - entity: select.sigen_plant_remote_ems_control_mode
            name: Operating Mode
          - entity: number.sigen_plant_grid_export_limitation
            name: Grid Export Limit
          - entity: number.sigen_plant_pcs_export_limitation
            name: PCS Export Limit
          - entity: number.sigen_plant_ess_max_charging_limit
            name: Max Charging Limit
          - entity: number.sigen_plant_ess_max_discharging_limit
            name: Max Discharging Limit
