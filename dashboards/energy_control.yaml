                type: column
                color: "#66BB6A"
                float_precision: 2
                group_by:
                  func: max
                  duration: 1d

      # ── 4. Import / Export Price Range ───────────────────────────
      - cards:
          - type: statistics-graph
            title: Import Price — Daily High / Low / Avg (c/kWh)
            entities:
              - entity: sensor.energy_import_price_cents
