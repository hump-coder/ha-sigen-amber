# Lovelace Dashboard – Sigenergy + Amber Energy Controller
# Uses only built-in HA card types (no custom cards required)

title: Energy Control
views:
  # ══════════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    type: sections
    max_columns: 3
    icon: mdi:solar-power
    badges: []
    sections:

      # ── Section 1: Energy Flow + Power Flow History ───────────
      - cards:
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.energy_power_flow_visual
                state: "on"
            card:
              type: custom:sigenergy-house-card
              battery_positive_charging: true
              entities:
                solar_power: sensor.sigen_plant_pv_power
                load_power: sensor.sigen_plant_total_load_power
                battery_power: sensor.sigen_plant_battery_power
                battery_soc: sensor.sigen_plant_battery_state_of_charge
                grid_active: sensor.sigen_plant_grid_active_power
                battery_capacity: sensor.sigen_plant_rated_energy_capacity
                battery_min_soc: input_number.energy_battery_min_soc
                text_size: input_number.energy_power_flow_text_size
                sun: sun.sun
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.energy_power_flow_visual
                state: "off"
            card:
              type: entities
              title: Live Power Flow
              entities:
                - entity: sensor.sigen_plant_pv_power
                  name: Solar Generation
                  icon: mdi:solar-power
                - entity: sensor.sigen_plant_total_load_power
                  name: House Load
                  icon: mdi:home-lightning-bolt
                - entity: sensor.sigen_plant_battery_power
                  name: Battery Power (+ charge / − discharge)
                  icon: mdi:battery-charging
                - entity: sensor.sigen_plant_grid_active_power
                  name: Grid Power (+ import / − export)
                  icon: mdi:transmission-tower
                - entity: sensor.sigen_plant_battery_state_of_charge
                  name: Battery SOC
                  icon: mdi:battery
          - type: history-graph
            title: Power Flow History
            hours_to_show: 12
            entities:
              - entity: sensor.sigen_plant_pv_power
                name: Solar
              - entity: sensor.sigen_plant_total_load_power
                name: Load
              - entity: sensor.sigen_plant_battery_power
                name: Battery
              - entity: sensor.sigen_plant_grid_active_power
                name: Grid

      # ── Section 2: Live Prices + Battery SOC + Buttons ────────
      - cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                entity: sensor.energy_import_price_cents
                name: Import Price
                icon: mdi:transmission-tower-import
                show_state: true
                show_label: true
                show_units: false
                label: |
                  [[[
                    const v = Number(entity.state);
                    if (isNaN(v)) return 'Unavailable';
                    if (v < 0) return 'Getting paid to import';
                    if (v <= 20) return 'Cheap import';
                    if (v <= 40) return 'Moderate import';
                    return 'Expensive import';
                  ]]]
                tap_action:
                  action: more-info
                hold_action:
                  action: more-info
                styles:
                  card:
                    - padding: 16px
                    - border-radius: 18px
                    - font-size: 16px
                  grid:
                    - grid-template-areas: "\"i n\" \"i s\" \"l l\""
                    - grid-template-columns: 56px 1fr
                    - grid-template-rows: min-content min-content min-content
                  icon:
                    - width: 34px
                  name:
                    - justify-self: start
                    - font-weight: 700
                    - font-size: 15px
                  state:
                    - justify-self: start
                    - font-weight: 800
                    - font-size: 28px
                  label:
                    - justify-self: start
                    - opacity: 0.85
                    - font-size: 13px
                state:
                  - operator: template
                    value: |
                      [[[
                        return Number(entity.state) < 0;
                      ]]]
                    styles:
                      card:
                        - background: rgba(76, 175, 80, 0.18)
                      icon:
                        - color: rgb(76, 175, 80)
                      state:
                        - color: rgb(76, 175, 80)
                  - operator: template
                    value: |
                      [[[
                        const v = Number(entity.state);
                        return v >= 0 && v <= 20;
                      ]]]
                    styles:
                      card:
                        - background: rgba(139, 195, 74, 0.18)
                      icon:
                        - color: rgb(139, 195, 74)
                      state:
                        - color: rgb(139, 195, 74)
                  - operator: template
                    value: |
                      [[[
                        const v = Number(entity.state);
                        return v > 20 && v <= 40;
                      ]]]
                    styles:
                      card:
                        - background: rgba(255, 193, 7, 0.18)
                      icon:
                        - color: rgb(255, 193, 7)
                      state:
                        - color: rgb(255, 193, 7)
                  - operator: template
                    value: |
                      [[[
                        return Number(entity.state) > 40;
                      ]]]
                    styles:
                      card:
                        - background: rgba(244, 67, 54, 0.18)
                      icon:
                        - color: rgb(244, 67, 54)
                      state:
                        - color: rgb(244, 67, 54)
                  - operator: default
                    styles:
                      card:
                        - background: rgba(120, 120, 120, 0.12)
                      icon:
                        - color: var(--primary-text-color)
                      state:
                        - color: var(--primary-text-color)
              - type: custom:button-card
                entity: sensor.energy_export_price_cents
                name: Export Price
                icon: mdi:transmission-tower-export
                show_state: true
                show_label: true
                show_units: false
                label: |
                  [[[
                    const v = Number(entity.state);
                    if (isNaN(v)) return 'Unavailable';
                    return v > 0 ? 'Exporting profitably'
                      : v < 0 ? 'Paying to export'
                      : 'Neutral';
                  ]]]
                tap_action:
                  action: more-info
                hold_action:
                  action: more-info
                styles:
                  card:
                    - padding: 16px
                    - border-radius: 18px
                    - font-size: 16px
                  grid:
                    - grid-template-areas: "\"i n\" \"i s\" \"l l\""
                    - grid-template-columns: 56px 1fr
                    - grid-template-rows: min-content min-content min-content
                  icon:
                    - width: 34px
                  name:
                    - justify-self: start
                    - font-weight: 700
                    - font-size: 15px
                  state:
                    - justify-self: start
                    - font-weight: 800
                    - font-size: 28px
                  label:
                    - justify-self: start
                    - opacity: 0.85
                    - font-size: 13px
                state:
                  - operator: template
                    value: |
                      [[[
                        return Number(entity.state) < 0;
                      ]]]
                    styles:
                      card:
                        - background: rgba(244, 67, 54, 0.18)
                      icon:
                        - color: rgb(244, 67, 54)
                      state:
                        - color: rgb(244, 67, 54)
                  - operator: template
                    value: |
                      [[[
                        return Number(entity.state) > 0;
                      ]]]
                    styles:
                      card:
                        - background: rgba(76, 175, 80, 0.18)
                      icon:
                        - color: rgb(76, 175, 80)
                      state:
                        - color: rgb(76, 175, 80)
                  - operator: default
                    styles:
                      card:
                        - background: rgba(120, 120, 120, 0.12)
                      icon:
                        - color: var(--primary-text-color)
                      state:
                        - color: var(--primary-text-color)

          # ── Notification Area ─────────────────────────────────
          - type: markdown
            content: >
              {% set manual_mode = states('input_select.energy_manual_mode') %}
              {% set ctrl_mode = states('sensor.energy_controller_mode') %}
              {% set hands_off = is_state('input_boolean.energy_manual_override', 'on') %}
              {% set spike = is_state('input_boolean.energy_solar_export_spike_enabled', 'on') %}
              {% set max_exp = states('input_number.energy_max_export_power') | float(10) %}
              {% set max_chg = states('input_number.energy_max_charge_power') | float(24) %}
              {% set max_dis = states('input_number.energy_max_discharge_power') | float(10) %}
              {% set exp_s = (max_exp | int | string) if max_exp % 1 == 0 else (max_exp | string) %}
              {% set chg_s = (max_chg | int | string) if max_chg % 1 == 0 else (max_chg | string) %}
              {% set dis_s = (max_dis | int | string) if max_dis % 1 == 0 else (max_dis | string) %}
              {% set ns = namespace(overrides=[], mods=[]) %}
              {% if manual_mode != 'Auto' %}{% set ns.overrides = ns.overrides + [manual_mode] %}{% endif %}
              {% if hands_off %}{% set ns.overrides = ns.overrides + ['Hands-off'] %}{% endif %}
              {% if spike %}{% set ns.overrides = ns.overrides + ['Solar Export Spike'] %}{% endif %}
              {% if max_exp != 10 %}{% set ns.mods = ns.mods + ['Max Export ' ~ exp_s ~ 'kW'] %}{% endif %}
              {% if max_chg != 24 %}{% set ns.mods = ns.mods + ['Max Charge ' ~ chg_s ~ 'kW'] %}{% endif %}
              {% if max_dis != 10 %}{% set ns.mods = ns.mods + ['Max Discharge ' ~ dis_s ~ 'kW'] %}{% endif %}
              **Mode:** {% if manual_mode == 'Auto' %}🟢 Auto · {{ ctrl_mode }}{% else %}🔧 {{ manual_mode }}{% endif %}
              &nbsp;|&nbsp; **Overrides:** {% if ns.overrides | length > 0 %}⚠️ {{ ns.overrides | join(' · ') }}{% else %}None{% endif %}
              &nbsp;|&nbsp; **Modified:** {% if ns.mods | length > 0 %}⚙️ {{ ns.mods | join(' · ') }}{% else %}—{% endif %}

          - type: vertical-stack
            cards:
              - type: gauge
                entity: sensor.battery_soc_display
                min: 0
                max: 100
                needle: true
                severity:
                  green: 50
                  yellow: 20
                  red: 0
              - type: custom:apexcharts-card
                header:
                  show: true
                  title: Amber Price Forecast
                graph_span: 20h
                span:
                  start: minute
                yaxis:
                  - decimals: 2
                    apex_config:
                      tickAmount: 8
                apex_config:
                  legend:
                    show: true
                  xaxis:
                    type: datetime
                    min: |
                      return Date.now()
                    max: |
                      return Date.now() + 20 * 60 * 60 * 1000
                series:
                  - entity: sensor.amber_express_home_general_price
                    name: Import
                    type: line
                    unit: " "
                    stroke_width: 2
                    curve: stepline
                    float_precision: 2
                    show:
                      legend_value: false
                    data_generator: |
                      return (entity.attributes.forecast || [])
                        .map(x => [new Date(x.time).getTime(), Number(x.value)])
                        .filter(x =>
                          !isNaN(x[0]) &&
                          !isNaN(x[1]) &&
                          x[0] >= Date.now() &&
                          x[0] <= Date.now() + 20 * 60 * 60 * 1000
                        );
                  - entity: sensor.amber_express_home_feed_in_price
                    name: Export
                    type: line
                    unit: " "
                    stroke_width: 2
                    curve: stepline
                    float_precision: 2
                    show:
                      legend_value: false
                    data_generator: |
                      return (entity.attributes.forecast || [])
                        .map(x => [new Date(x.time).getTime(), Number(x.value)])
                        .filter(x =>
                          !isNaN(x[0]) &&
                          !isNaN(x[1]) &&
                          x[0] >= Date.now() &&
                          x[0] <= Date.now() + 20 * 60 * 60 * 1000
                        );
          - !include energy_override_buttons.yaml

      # ── Section 3: Solar Forecast + Cost & Revenue ────────────
      - cards:
          - type: custom:apexcharts-card
            header:
              title: Solar forecast
              show: true
              show_states: true
              colorize_states: true
            apex_config:
              chart:
                height: 300px
              tooltip:
                enabled: true
                shared: true
                followCursor: true
            graph_span: 12h
            span:
              start: day
              offset: +6h
            show:
              loading: false
            yaxis:
              - id: capacity
                show: true
                opposite: true
                decimals: 0
                max: 100
                min: 0
                apex_config:
                  tickAmount: 10
              - id: kWh
                show: true
                min: 0
                apex_config:
                  tickAmount: 10
              - id: header_only
                show: false
            series:
              - entity: sensor.sigen_plant_pv_power
                name: Solar Power (now)
                type: line
                stroke_width: 2
                float_precision: 2
                color: Orange
                yaxis_id: kWh
                unit: kW
                extend_to: now
                show:
                  legend_value: true
                  in_header: false
                group_by:
                  func: avg
                  duration: 5m
              - entity: sensor.solcast_pv_forecast_forecast_today
                name: Expected
                color: Grey
                opacity: 0.3
                stroke_width: 0
                type: area
                time_delta: +15min
                extend_to: false
                yaxis_id: kWh
                show:
                  legend_value: false
                  in_header: false
                data_generator: |
                  return entity.attributes.detailedForecast.map((entry) => {
                        return [new Date(entry.period_start), entry.pv_estimate];
                      });
              - entity: sensor.solcast_pv_forecast_forecast_today
                name: Pessimistic
                color: Grey
                opacity: 0.3
                stroke_width: 0
                type: area
                time_delta: +15min
                extend_to: false
                yaxis_id: kWh
                show:
                  legend_value: false
                  in_header: false
                data_generator: |
                  return entity.attributes.detailedForecast.map((entry) => {
                        return [new Date(entry.period_start), entry.pv_estimate10];
                      });
              - entity: sensor.sigen_plant_daily_pv_energy
                yaxis_id: header_only
                name: Today Actual
                stroke_width: 2
                color: Orange
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
              - entity: sensor.solcast_pv_forecast_forecast_today
                yaxis_id: header_only
                name: Expected
                color: Grey
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
              - entity: sensor.solcast_pv_forecast_forecast_today
                attribute: estimate10
                yaxis_id: header_only
                name: Pessimistic
                color: Grey
                opacity: 0.3
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
              - entity: sensor.solcast_pv_forecast_forecast_remaining_today
                yaxis_id: header_only
                name: Remaining
                color: Grey
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
          - type: custom:apexcharts-card
            header:
              title: Solar forecast tomorrow
              show: true
              show_states: true
              colorize_states: true
            apex_config:
              chart:
                height: 300px
              tooltip:
                enabled: true
                shared: true
                followCursor: true
            graph_span: 14h
            span:
              start: day
              offset: +1d+6h
            show:
              loading: false
            yaxis:
              - id: kWh
                show: true
                min: 0
                apex_config:
                  tickAmount: 10
              - id: header_only
                show: false
            series:
              - entity: sensor.solcast_pv_forecast_forecast_tomorrow
                name: Expected
                color: Gold
                opacity: 0.4
                stroke_width: 0
                type: area
                extend_to: false
                yaxis_id: kWh
                show:
                  legend_value: false
                  in_header: false
                data_generator: |
                  return entity.attributes.detailedForecast.map((entry) => {
                        return [new Date(entry.period_start), entry.pv_estimate];
                      });
              - entity: sensor.solcast_pv_forecast_forecast_tomorrow
                name: Pessimistic
                color: Grey
                opacity: 0.3
                stroke_width: 0
                type: area
                extend_to: false
                yaxis_id: kWh
                show:
                  legend_value: false
                  in_header: false
                data_generator: |
                  return entity.attributes.detailedForecast.map((entry) => {
                        return [new Date(entry.period_start), entry.pv_estimate10];
                      });
              - entity: sensor.solcast_pv_forecast_forecast_tomorrow
                yaxis_id: header_only
                name: Expected
                color: Gold
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
                data_generator: |
                  return [[Date.now(), parseFloat(entity.state)]];
              - entity: sensor.solcast_pv_forecast_forecast_tomorrow
                yaxis_id: header_only
                name: Pessimistic
                color: Grey
                opacity: 0.3
                show:
                  legend_value: true
                  in_header: true
                  in_chart: false
                data_generator: |
                  return [[Date.now(), parseFloat(entity.attributes.estimate10)]];
          - type: markdown
            content: |
              {% set imp     = states('input_number.energy_daily_import_cost') | float(0) %}
              {% set exp     = states('input_number.energy_daily_export_revenue') | float(0) %}
              {% set imp_kwh = states('input_number.energy_daily_import_kwh') | float(0) %}
              {% set exp_kwh = states('input_number.energy_daily_export_kwh') | float(0) %}
              {% set net     = imp - exp %}
              {% set y_imp     = states('input_number.energy_yesterday_import_cost') | float(0) %}
              {% set y_exp     = states('input_number.energy_yesterday_export_revenue') | float(0) %}
              {% set y_net     = y_imp - y_exp %}
              {% set y_imp_kwh = states('input_number.energy_yesterday_import_kwh') | float(0) %}
              {% set y_exp_kwh = states('input_number.energy_yesterday_export_kwh') | float(0) %}
              ## 💰 Today's Cost & Revenue
              ⚡ Imported: **{{ imp_kwh | round(2) }} kWh** — cost **${{ imp | round(2) }}**
              📤 Exported: **{{ exp_kwh | round(2) }} kWh** — earned **${{ exp | round(2) }}**
              {% if net <= 0 %}✅ **Net profit: ${{ (net | abs) | round(2) }}**{% else %}💸 **Net cost: ${{ net | round(2) }}**{% endif %}

              ---
              ## 📅 Yesterday
              ⚡ Imported: **{{ y_imp_kwh | round(2) }} kWh** — cost **${{ y_imp | round(2) }}**
              📤 Exported: **{{ y_exp_kwh | round(2) }} kWh** — earned **${{ y_exp | round(2) }}**
              {% if y_net <= 0 %}✅ **Net profit: ${{ (y_net | abs) | round(2) }}**{% else %}💸 **Net cost: ${{ y_net | round(2) }}**{% endif %}

  # ══════════════════════════════════════════════════════════════
  - title: Info
    path: info
    icon: mdi:information-outline
    badges: []
    cards:

      # ── Current Mode Banner ──────────────────────────────────
      - type: markdown
        content: >
          {% set mode = states('sensor.energy_controller_mode') %}
          {% set icons = {
            'Force Charge':    '⚡',
            'Cheap Charge':    '🔋',
            'Hold Battery':    '⏳',
            'Maximum Export':  '📤',
            'Self Consume':    '☀️',
            'No Export':       '🏠',
            'Manual Override': '🔧',
            'Error':           '❌'
          } %}
          {% set icon = icons.get(mode, '❓') %}
          ## {{ icon }} {{ mode }}
          {{ states('sensor.energy_controller_reason') }}

      # ── Solar vs Load Today ──────────────────────────────────
      - type: markdown
        content: >
          {% set forecast = state_attr('sensor.energy_today_plan', 'solar_forecast_kwh') | float(0) %}
          {% set load = state_attr('sensor.energy_today_plan', 'expected_load_kwh') | float(0) %}
          {% set surplus = state_attr('sensor.energy_today_plan', 'surplus_kwh') | float(0) %}
          ## ☀️ Today's Solar vs Load

          Solar Forecast: **{{ forecast | round(1) }} kWh**
          Expected Load: **{{ load | round(1) }} kWh**
          {{ '✅ Surplus' if surplus >= 0 else '⚠️ Deficit' }}: **{{ surplus | abs | round(1) }} kWh**

          {% if surplus >= 0 %}
          Solar expected to cover load today
          {% else %}
          Solar may not cover load – controller will seek cheap import windows
          {% endif %}

      # ── Morning Export Floor ────────────────────────────────
      - type: markdown
        content: >
          {% set ws   = state_attr('sensor.energy_morning_soc_floor', 'window_start') | default('07:30') %}
          {% set we   = state_attr('sensor.energy_morning_soc_floor', 'window_end')   | default('11:00') %}
          {% set sol  = state_attr('sensor.energy_morning_soc_floor', 'morning_solar_kwh') | float(0) %}
          {% set esol = state_attr('sensor.energy_morning_soc_floor', 'morning_solar_effective_kwh') | float(0) %}
          {% set load = state_attr('sensor.energy_morning_soc_floor', 'morning_load_kwh') | float(0) %}
          {% set surp = state_attr('sensor.energy_morning_soc_floor', 'surplus_kwh') | float(0) %}
          {% set eff  = state_attr('sensor.energy_morning_soc_floor', 'effective_min_soc') | float(0) %}
          {% set base = state_attr('sensor.energy_morning_soc_floor', 'base_min_soc') | float(0) %}
          {% set relax = state_attr('sensor.energy_morning_soc_floor', 'relax_factor') | float(0) %}
          {% set soc  = states('sensor.sigen_plant_battery_state_of_charge') | float(0) %}
          {% set can  = state_attr('sensor.energy_morning_soc_floor', 'can_export') %}
          ## 🌅 Morning Window Export ({{ ws }}–{{ we }})
          **Solcast forecast:** {{ sol | round(1) }} kWh → {{ esol | round(1) }} kWh after 15% margin
          **Morning load est.:** {{ load | round(1) }} kWh
          {% if surp > 0 %}
          ☀️ **Surplus {{ surp | round(1) }} kWh** – solar will cover morning load and recharge battery
          {% else %}
          ⚠️ **Deficit {{ (surp | abs) | round(1) }} kWh** – morning solar won't cover load, protecting battery
          {% endif %}

          ---
          {% set now_h = now().hour + now().minute / 60 %}
          {% set morning_end = 11.0 %}
          {% set relax_start = 22.0 %}
          {% set in_window = now_h >= relax_start or now_h < morning_end %}
          **Export SOC floor:** {% if eff < base %}**{{ eff | round(0) | int }}%** *(relaxed from {{ base | round(0) | int }}%, {{ (relax * 100) | round(0) | int }}% of max relaxation applied)*{% elif not in_window %}**{{ base | round(0) | int }}%** *(outside relaxation window – normal rules)*{% elif now_h >= morning_end %}**{{ base | round(0) | int }}%** *(post-morning – solar cranking)*{% else %}**{{ base | round(0) | int }}%** *(no relaxation – morning solar won't cover load)*{% endif %}
          **Battery now:** {{ soc | round(0) | int }}% → {% if can %}✅ above floor, **battery export allowed**{% else %}🔒 below floor, **holding battery reserve**{% endif %}

      # ── Today's Action Plan ──────────────────────────────────
      - type: markdown
        title: Today's Price & Action Plan
        content: >
          {{ state_attr('sensor.energy_today_plan', 'plan_markdown') or 'No forecast data available yet' }}

      # ── Price History Graph ──────────────────────────────────
      - type: history-graph
        title: Import / Export Price ($/kWh)
        hours_to_show: 24
        entities:
          - entity: sensor.the_hump_general_price
            name: Import
          - entity: sensor.the_hump_feed_in_price
            name: Export (Feed-in)

      # ── Mode Change History ──────────────────────────────────
      - type: history-graph
        title: Controller Mode History
        hours_to_show: 24
        entities:
          - entity: sensor.energy_controller_mode
            name: Mode

  # ══════════════════════════════════════════════════════════════
  - title: Stats 7d
    path: stats-7d
    icon: mdi:chart-bar
    type: sections
    max_columns: 2
    badges: []
    sections:

      # ── 1. Daily Energy Totals ───────────────────────────────────
      - column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              title: Daily Energy — Solar / House Load / Import / Export (kWh)
              show: true
            graph_span: 7d
            span:
              end: day
            apex_config:
              chart:
                height: 280
              plotOptions:
                bar:
                  columnWidth: 60%
              xaxis:
                type: datetime
                labels:
                  format: "dd MMM"
              dataLabels:
                enabled: false
              legend:
                show: true
                position: top
            yaxis:
              - decimals: 1
                apex_config:
                  title:
                    text: kWh
            series:
              - entity: sensor.sigen_plant_daily_pv_energy
                name: Solar
                type: column
                color: "#FFA726"
                float_precision: 1
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.sigen_plant_daily_load_consumption
                name: House Load
                type: column
                color: "#42A5F5"
