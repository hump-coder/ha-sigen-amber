# Energy Controller Override Buttons
# =====================================
# Reusable card include for any Lovelace dashboard.
#
# Usage in any dashboard YAML:
#   - !include energy_override_buttons.yaml
#
# This file must be in the same directory as the dashboard that includes it,
# or provide a relative path, e.g.:
#   - !include dashboards/energy_override_buttons.yaml

type: vertical-stack
cards:
  - type: markdown
    content: >
      {% set mode = states('input_select.energy_manual_mode') %}
      {% set ctrl = states('sensor.energy_controller_mode') %}
      {% if mode != 'Auto' %}
      ### 🔧 Manual Override Active: **{{ mode }}**
      {% else %}
      ### ⚡ Energy Override — Auto ({{ ctrl }})
      {% endif %}

  - type: horizontal-stack
    cards:
      - type: button
        name: "Auto"
        icon: mdi:auto-mode
        show_state: false
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.energy_manual_mode
            option: "Auto"
        card_mod:
          style: |
            ha-card {
              {% if states('input_select.energy_manual_mode') == 'Auto' %}
              border: 2px solid var(--success-color);
              {% endif %}
            }

      - type: button
        name: "Export Battery"
        icon: mdi:battery-arrow-up
        show_state: false
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.energy_manual_mode
            option: "Export Battery"

      - type: button
        name: "Stop Batt Export"
        icon: mdi:battery-arrow-up-outline
        show_state: false
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.energy_manual_mode
            option: "Stop Battery Export"

  - type: horizontal-stack
    cards:
      - type: custom:button-card
        entity: input_select.energy_manual_mode
        name: Charge from Grid
        icon: mdi:battery-charging
        show_state: false
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.energy_manual_mode
            option: "Charge from Grid"
        state:
          - operator: template
            value: |
              [[[
                return entity.state === 'Charge from Grid';
              ]]]
            styles:
              card:
                - background: rgba(255, 152, 0, 0.18)
              icon:
                - color: rgb(255, 152, 0)

      - type: custom:button-card
        icon: mdi:minus
        show_name: false
        tap_action:
          action: call-service
          service: input_number.decrement
          service_data:
            entity_id: input_number.energy_charge_from_grid_max_price

      - type: custom:button-card
        entity: input_number.energy_charge_from_grid_max_price
        show_icon: false
        show_state: false
        show_name: true
        show_label: true
        name: |
          [[[
            const v = Number(entity.state);
            return isNaN(v) ? '—' : `${Math.round(v)}c`;
          ]]]
        label: max charge price
        tap_action:
          action: more-info
        styles:
          name:
            - font-size: 22px
            - font-weight: 800
          label:
            - font-size: 10px
            - opacity: 0.65

      - type: custom:button-card
        icon: mdi:plus
        show_name: false
        tap_action:
          action: call-service
          service: input_number.increment
          service_data:
            entity_id: input_number.energy_charge_from_grid_max_price

  - type: horizontal-stack
    cards:
      - type: button
        name: "No Export"
        icon: mdi:transmission-tower-off
        show_state: false
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.energy_manual_mode
            option: "No Export"

      - type: button
        name: "Self Consume"
        icon: mdi:home-lightning-bolt
        show_state: false
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.energy_manual_mode
            option: "Self Consume"

      - type: button
        name: "Solar Priority"
        icon: mdi:solar-power
        show_state: false
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.energy_manual_mode
            option: "Solar Priority"

  - type: horizontal-stack
    cards:
      - type: button
        name: "Solar Export on Spike"
        icon: mdi:transmission-tower-export
        show_state: false
        tap_action:
          action: call-service
          service: input_boolean.toggle
          data:
            entity_id: input_boolean.energy_solar_export_spike_enabled
        card_mod:
          style: |
            ha-card {
              {% if is_state('input_boolean.energy_solar_export_spike_enabled', 'on') %}
              border: 2px solid var(--warning-color);
              {% endif %}
            }

      - type: markdown
        content: >
          **Spike threshold:** {{ states('input_number.energy_solar_export_spike_threshold') | int }}c/kWh
          * *
