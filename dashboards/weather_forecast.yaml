# Weather Forecast Dashboard – Bureau of Meteorology
# =====================================================
# Daily temperature forecast chart using weather.sampson_flat (BoM integration).
# Requires: custom:apexcharts-card

title: Weather Forecast
views:
  - title: Forecast
    path: weather-forecast
    icon: mdi:weather-partly-cloudy
    type: sections
    max_columns: 1
    badges: []
    sections:

      - cards:
          - type: custom:apexcharts-card
            header:
              title: "7-Day Temperature Forecast – Sampson Flat"
              show: true
            update_interval: 3600  # refresh hourly; BoM data doesn't change faster
            apex_config:
              chart:
                height: 320
                toolbar:
                  show: false
              stroke:
                curve: smooth
                width: 2
              fill:
                type: gradient
                gradient:
                  shadeIntensity: 0.3
                  opacityFrom: 0.15
                  opacityTo: 0.0
              markers:
                size: 5
              xaxis:
                type: datetime
                labels:
                  format: "EEE d/M"
                  datetimeUTC: false
              tooltip:
                x:
                  format: "EEE d MMM"
                shared: true
              legend:
                show: true
                position: top
              annotations:
                yaxis:
                  - y: 0
                    borderColor: "#90A4AE"
                    strokeDashArray: 2
            yaxis:
              - decimals: 0
                apex_config:
                  title:
                    text: "°C"
                  labels:
                    formatter: |
                      function(val) { return val + "°"; }
            series:
              - entity: weather.sampson_flat
                name: "Max °C"
                color: "#FF6B6B"
                type: line
                data_generator: |
                  return entity.attributes.forecast.map(f => {
                    return [new Date(f.datetime).getTime(), f.temperature];
                  });

              - entity: weather.sampson_flat
                name: "Min °C"
                color: "#42A5F5"
                type: line
                data_generator: |
                  return entity.attributes.forecast.map(f => {
                    return [new Date(f.datetime).getTime(), f.templow];
                  });

          - type: custom:apexcharts-card
            header:
              title: "Precipitation Probability (%)"
              show: true
            update_interval: 3600
            apex_config:
              chart:
                height: 200
                toolbar:
                  show: false
              plotOptions:
                bar:
                  columnWidth: 50%
              xaxis:
                type: datetime
                labels:
                  format: "EEE d/M"
                  datetimeUTC: false
              tooltip:
                x:
                  format: "EEE d MMM"
              legend:
                show: false
            yaxis:
              - min: 0
                max: 100
                decimals: 0
                apex_config:
                  title:
                    text: "%"
            series:
              - entity: weather.sampson_flat
                name: "Rain chance"
                color: "#42A5F5"
                type: column
                data_generator: |
                  return entity.attributes.forecast.map(f => {
                    return [new Date(f.datetime).getTime(), f.precipitation_probability ?? 0];
                  });
